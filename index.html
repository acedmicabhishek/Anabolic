<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Anabolic - Premium Fitness and Nutrition Tracker">
    <title>Anabolic</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981;
            --primary-glow: rgba(16, 185, 129, 0.4);
            --bg: #0D1117;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.1), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.1), transparent 25%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 4rem 3rem;
            text-align: center;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 20px var(--primary-glow));
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, rgba(255, 255, 255, 0.7) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.hero-text {
            font-size: 1.125rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 3rem;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--primary);
            color: #000;
            text-decoration: none;
            padding: 1rem 2.5rem;
            border-radius: 100px;
            font-weight: 800;
            font-size: 1.125rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .download-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.6);
            background: #34d399;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .source-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            text-decoration: none;
            padding: 1rem 2.5rem;
            border-radius: 100px;
            border: 1px solid var(--border);
            font-weight: 800;
            font-size: 1.125rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .source-btn:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .source-btn svg {
            width: 24px;
            height: 24px;
        }

        .download-btn svg {
            width: 24px;
            height: 24px;
        }

        .features-grid {
            margin-top: 3.5rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            text-align: left;
            position: relative;
        }

        .features-grid::before {
            content: '';
            position: absolute;
            top: -1.75rem;
            left: 10%;
            width: 80%;
            height: 1px;
            background: var(--border);
        }

        .feature-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            transition: transform 0.2s ease;
        }

        .feature-item:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .feature-title {
            color: var(--primary);
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .feature-desc {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin: 0;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .features-grid {
                grid-template-columns: 1fr;
            }

            .features-grid::before {
                display: none;
            }

            h1 {
                font-size: 2.5rem;
            }

            .glass-card {
                padding: 2.5rem 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="glass-card">
            <img src="./assets/logo.png" alt="Anabolic Logo" class="logo"
                onerror="this.src='https://raw.githubusercontent.com/acedmicabhishek/Anabolic/main/assets/logo.png'">
            <h1>Anabolic</h1>
            <p class="hero-text">Track everything.</p>

            <div class="button-group">
                <a href="https://github.com/acedmicabhishek/Anabolic/releases/latest" class="download-btn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    Download
                </a>

                <a href="https://github.com/acedmicabhishek/Anabolic" class="source-btn">
                    <svg fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.45-1.15-1.1-1.46-1.1-1.46-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z">
                        </path>
                    </svg>
                    Source Code
                </a>
            </div>

        </div>
    </div>
</body>

</html>
